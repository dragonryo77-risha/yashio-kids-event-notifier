name: Notify kids events

on:
  schedule:
    # 毎日 7:30 JST (=22:30 UTC 前日) に実行
    - cron: "30 22 * * *"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - run: pip install -r requirements.txt
      - name: Debug token length (troubleshooting only)
        env:
          LINE_CHANNEL_ACCESS_TOKEN: ${{ secrets.LINE_CHANNEL_ACCESS_TOKEN }}
        run: |
          echo "token length: ${#LINE_CHANNEL_ACCESS_TOKEN}"
          echo "first 6 chars: ${LINE_CHANNEL_ACCESS_TOKEN:0:6}"
          echo "last 6 chars: ${LINE_CHANNEL_ACCESS_TOKEN: -6}"

      - name: Run notifier
        env:
          LINE_CHANNEL_ACCESS_TOKEN: ${{ secrets.LINE_CHANNEL_ACCESS_TOKEN }}
        run: python src/main.py

      - name: Commit updated state
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/state.json
          git diff --cached --quiet || git commit -m "chore: update seen events state"
          git push
